<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Main content area -->
  <g transform="translate(100, 150)">
    <!-- iLand Logo -->
    <circle cx="60" cy="60" r="60" fill="#1f2937"/>
    <path d="M45 30L30 60L45 90" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M75 30L90 60L75 90" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="60" r="8" fill="#3b82f6"/>
    
    <!-- Title -->
    <text x="150" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff">
      iLand
    </text>
    
    <!-- Subtitle -->
    <text x="150" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">
      Source Code Selling Platform
    </text>
    
    <!-- Description -->
    <text x="150" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#64748b" max-width="800">
      Empowering solo software engineers with secure, scalable marketplace solutions
    </text>
    
    <!-- Features -->
    <g transform="translate(150, 200)">
      <circle cx="15" cy="15" r="15" fill="#3b82f6" opacity="0.1"/>
      <text x="40" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#e2e8f0">
        Secure Downloads
      </text>
      
      <circle cx="15" cy="55" r="15" fill="#10b981" opacity="0.1"/>
      <text x="40" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#e2e8f0">
        Payment Processing
      </text>
      
      <circle cx="15" cy="95" r="15" fill="#f59e0b" opacity="0.1"/>
      <text x="40" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#e2e8f0">
        Analytics Dashboard
      </text>
    </g>
  </g>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>

name: Bug report
description: Report something that is broken or incorrect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Security issues **must not**
        be filed here; follow **SECURITY.md** at the repository root instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the problem.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps so someone else can see the same behavior.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version (`node -v`), browser (if UI-related), and commit or tag when helpful.
      placeholder: |
        - OS:
        - Node:
        - Browser (if any):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Redact secrets and tokens before pasting.
    validations:
      required: false

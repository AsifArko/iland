name: Security Scan

on:
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: "0 2 * * *"
  push:
    branches: [master, develop, feature/*]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate --json > audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const auditReport = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));

            let comment = '## 🔒 Security Audit Results\n\n';

            if (auditReport.metadata.vulnerabilities.total > 0) {
              comment += `⚠️ **${auditReport.metadata.vulnerabilities.total} vulnerabilities found**\n\n`;
              comment += '| Severity | Count |\n';
              comment += '|----------|-------|\n';
              comment += `| Critical | ${auditReport.metadata.vulnerabilities.critical || 0} |\n`;
              comment += `| High | ${auditReport.metadata.vulnerabilities.high || 0} |\n`;
              comment += `| Moderate | ${auditReport.metadata.vulnerabilities.moderate || 0} |\n`;
              comment += `| Low | ${auditReport.metadata.vulnerabilities.low || 0} |\n\n`;
              comment += 'Please review and fix these vulnerabilities before merging.';
            } else {
              comment += '✅ **No vulnerabilities found**\n\nAll dependencies are secure!';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk to check for vulnerabilities
        if: secrets.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
        continue-on-error: true

      - name: Skip Snyk scan (no token)
        if: secrets.SNYK_TOKEN == ''
        run: echo "Skipping Snyk scan - SNYK_TOKEN not configured"

      - name: Upload Snyk report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('**/Dockerfile') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "iland:latest"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: HEAD
          head: HEAD~1
          extra_args: --only-verified --fail

  license-compliance:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check licenses
        run: npx license-checker --summary --onlyAllow "MIT;ISC;Apache-2.0;BSD-2-Clause;BSD-3-Clause;CC0-1.0;Unlicense"

  security-notification:
    name: Security Alert Notification
    runs-on: ubuntu-latest
    needs: [dependency-scan, snyk-scan, codeql-analysis]
    if: always()
    steps:
      - name: Check for security issues
        id: check-security
        run: |
          if [ "${{ needs.dependency-scan.result }}" == "failure" ] || \
             [ "${{ needs.snyk-scan.result }}" == "failure" ] || \
             [ "${{ needs.codeql-analysis.result }}" == "failure" ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification for security issues
        if: steps.check-security.outputs.has_issues == 'true'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#security"
          text: "🚨 Security vulnerabilities detected in the codebase!"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

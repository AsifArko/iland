name: Monitoring and Alerts

on:
  schedule:
    # Run monitoring checks every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-analysis:
    name: Bundle Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build with bundle analyzer
        run: |
          npm install -g @next/bundle-analyzer
          ANALYZE=true npm run build
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: .next/analyze/
          retention-days: 7

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check production site health
        run: |
          curl -f https://iland.vercel.app/api/health || exit 1
        continue-on-error: true

      - name: Check staging site health
        run: |
          curl -f https://iland-staging.vercel.app/api/health || exit 1
        continue-on-error: true

      - name: Check API endpoints
        run: |
          # Test critical API endpoints
          curl -f https://iland.vercel.app/api/contact || echo "Contact API failed"
          curl -f https://iland.vercel.app/api/get-price || echo "Price API failed"
        continue-on-error: true

  uptime-monitoring:
    name: Uptime Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check site availability
        run: |
          # Check main site
          response=$(curl -s -o /dev/null -w "%{http_code}" https://iland.vercel.app)
          if [ "$response" != "200" ]; then
            echo "❌ Main site returned status $response"
            exit 1
          else
            echo "✅ Main site is healthy"
          fi

          # Check API health
          api_response=$(curl -s -o /dev/null -w "%{http_code}" https://iland.vercel.app/api/health)
          if [ "$api_response" != "200" ]; then
            echo "❌ API returned status $api_response"
            exit 1
          else
            echo "✅ API is healthy"
          fi

      - name: Send alert on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#alerts"
          text: "🚨 Site health check failed! Please investigate."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  dependency-updates:
    name: Dependency Updates Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Check for outdated dependencies
        run: |
          npm outdated --json > outdated.json || echo "{}" > outdated.json

          # Count outdated packages
          outdated_count=$(jq 'length' outdated.json)

          if [ "$outdated_count" -gt 0 ]; then
            echo "Found $outdated_count outdated dependencies"
            cat outdated.json
            exit 1
          else
            echo "All dependencies are up to date"
          fi

      - name: Send dependency update alert
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#maintenance"
          text: "📦 Dependencies need updating! Check the workflow for details."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  error-tracking:
    name: Error Tracking
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check error rates
        run: |
          # This would integrate with your error tracking service
          # For now, we'll simulate checking error rates
          echo "Checking error rates from monitoring service..."

          # Example: Check Sentry for recent errors
          # curl -H "Authorization: Bearer ${{ secrets.SENTRY_TOKEN }}" \
          #   "https://sentry.io/api/0/projects/org/project/stats/" \
          #   -d "stat=received&resolution=1h&since=$(date -d '1 hour ago' -u +%Y-%m-%dT%H:%M:%S)" \
          #   -d "until=$(date -u +%Y-%m-%dT%H:%M:%S)"

      - name: Alert on high error rates
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#alerts"
          text: "🚨 High error rate detected! Please investigate."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  performance-alerts:
    name: Performance Alerts
    runs-on: ubuntu-latest
    needs: [performance-test]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Check performance thresholds
        run: |
          # This would check Lighthouse CI results
          # For now, we'll simulate performance checks
          echo "Checking performance metrics..."

          # Example: Check if bundle size increased significantly
          # if [ "$BUNDLE_SIZE" -gt "$PREVIOUS_BUNDLE_SIZE" ]; then
          #   echo "Bundle size increased significantly"
          #   exit 1
          # fi

      - name: Send performance alert
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: "#performance"
          text: "📊 Performance regression detected! Check Lighthouse results."
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

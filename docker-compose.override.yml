version: "3.8"

services:
  iland-app:
    environment:
      # Additional environment variables can be set here
      # These will override the base configuration
      - PORT=3000
      - HOSTNAME=0.0.0.0
    # You can also add additional environment files
    env_file:
      - .env.local
      - .env.production # Optional production-specific env file

  iland-dev:
    environment:
      # Development-specific environment variables
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NODE_ENV=development
    # You can also add additional environment files
    env_file:
      - .env.local
      - .env.development # Optional development-specific env file
